<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="currentColor">
  <!-- 手机主体 -->
  <rect x="25" y="10" width="50" height="80" rx="8" ry="8" fill="none" stroke="currentColor" stroke-width="3"/>

  <!-- 屏幕区域 -->
  <rect x="31" y="18" width="38" height="58" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"/>

  <!-- 顶部扬声器/刘海区域 -->
  <rect x="42" y="14" width="16" height="3" rx="1.5" ry="1.5"/>

  <!-- 底部Home指示条 -->
  <rect x="40" y="80" width="20" height="2" rx="1" ry="1"/>

  <!-- 左侧静音键 -->
  <rect x="22" y="30" width="3" height="6" rx="1" ry="1"/>

  <!-- 右侧音量键（上） -->
  <rect x="75" y="28" width="3" height="6" rx="1" ry="1"/>

  <!-- 右侧音量键（下） -->
  <rect x="75" y="38" width="3" height="6" rx="1" ry="1"/>

  <!-- 右侧电源键 -->
  <rect x="75" y="52" width="3" height="8" rx="1" ry="1"/>

  <!-- 底部扬声器孔 -->
  <rect x="38" y="88" width="8" height="1.5" rx="0.5"/>
  <rect x="50" y="88" width="8" height="1.5" rx="0.5"/>
</svg>