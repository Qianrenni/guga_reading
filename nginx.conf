worker_processes 1;
error_log /dev/null emerg;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log off;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    gzip_disable "msie6";

    server {
        listen 80;
        # 默认根目录,用于兜底或存放公共文件
        root /usr/share/nginx/html;

        # ---------------------------------------------------------
        # 1. User 应用 (路径: /)
        # ---------------------------------------------------------
        location / {
            # 指定该 location 的物理根目录
            root /usr/share/nginx/html/user;
            index index.html index.htm;

            # 【核心】支持 Vue Router History 模式
            # 如果文件不存在,则尝试返回目录下的 index.html
            try_files $uri $uri/ /index.html;

            # 静态资源缓存优化
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # ---------------------------------------------------------
        # 2. Author 应用 (路径: /author/)
        # ---------------------------------------------------------
        location /author/ {
            # 注意：这里 root 依然指向父级,因为 URI 包含 /author/
            # 请求 /author/a.html -> 物理路径: /usr/share/nginx/html/author/a.html
            root /usr/share/nginx/html;
            index index.html index.htm;

            # 【核心】支持 Vue Router History 模式
            # 如果 /author/xxx 不存在,则回退到 /author/index.html
            try_files $uri $uri/ /author/index.html;

            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # ---------------------------------------------------------
        # 3. Admin 应用 (路径: /admin/)
        # ---------------------------------------------------------
        location /admin/ {
            root /usr/share/nginx/html;
            index index.html index.htm;

            # 【核心】支持 Vue Router History 模式
            try_files $uri $uri/ /admin/index.html;

            expires 1d;
            add_header Cache-Control "public, immutable";
        }
        
    }
    
}